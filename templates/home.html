<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
            background: linear-gradient(150deg, #f8efe6 0%, #e1e8f5 55%, #eef6f0 100%);
            color: #172033;
        }

        .card {
            width: min(560px, 100%);
            padding: 32px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 24px 70px rgba(23, 32, 51, 0.16);
            border: 1px solid rgba(23, 32, 51, 0.08);
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(34px, 7vw, 52px);
            line-height: 0.96;
        }

        p {
            margin: 0 0 22px;
            color: #64748b;
            line-height: 1.6;
        }

        a {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-height: 50px;
            padding: 0 20px;
            border-radius: 16px;
            background: #172033;
            color: #ffffff;
            text-decoration: none;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <section class="card">
        <h1>ChatApp</h1>
        <p>Entry page. Asosiy oqim login va private room list orqali ishlaydi.</p>
        <a href="{% url 'login' %}">Go to login</a>
    </section>
</body>
</html>
