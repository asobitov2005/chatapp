<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp</title>
    <style>
        :root {
            --page: #eef2f7;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --line: #d8dee9;
            --text: #172033;
            --muted: #64748b;
            --teal: #0f766e;
            --teal-dark: #115e59;
            --amber: #b45309;
            --navy: #111827;
            --shadow: 0 24px 70px rgba(17, 24, 39, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, "Avenir Next", "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background:
                linear-gradient(135deg, rgba(15, 118, 110, 0.12), transparent 34%),
                linear-gradient(225deg, rgba(180, 83, 9, 0.12), transparent 38%),
                var(--page);
        }

        .page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .panel {
            width: min(880px, 100%);
            display: grid;
            grid-template-columns: 1fr 0.85fr;
            gap: 0;
            border-radius: 26px;
            overflow: hidden;
            border: 1px solid rgba(216, 222, 233, 0.92);
            background: rgba(255, 255, 255, 0.94);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .hero,
        .preview {
            padding: 34px;
        }

        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 54px;
            height: 54px;
            border-radius: 16px;
            background: var(--navy);
            color: #ffffff;
            font-weight: 900;
        }

        h1 {
            margin: 26px 0 12px;
            font-size: clamp(44px, 8vw, 76px);
            line-height: 0.94;
            letter-spacing: 0;
        }

        p {
            margin: 0;
            max-width: 440px;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 28px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
            padding: 0 18px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 900;
        }

        .button.primary {
            background: var(--teal);
            color: #ffffff;
        }

        .button.secondary {
            background: #ffffff;
            border: 1px solid var(--line);
            color: var(--navy);
        }

        .preview {
            background: var(--surface-soft);
            border-left: 1px solid var(--line);
            display: flex;
            align-items: center;
        }

        .phone {
            width: 100%;
            border-radius: 24px;
            border: 1px solid var(--line);
            background: #ffffff;
            padding: 16px;
            box-shadow: 0 18px 44px rgba(17, 24, 39, 0.12);
        }

        .phone-head {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--line);
        }

        .avatar {
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: rgba(15, 118, 110, 0.12);
            color: var(--teal-dark);
            font-weight: 900;
        }

        .name {
            display: block;
            font-weight: 900;
        }

        .status {
            display: block;
            color: var(--muted);
            font-size: 13px;
        }

        .bubbles {
            display: grid;
            gap: 12px;
            padding-top: 18px;
        }

        .bubble {
            min-height: 42px;
            border-radius: 16px;
            padding: 12px 14px;
            line-height: 1.4;
        }

        .bubble.other {
            width: 82%;
            border: 1px solid var(--line);
            background: #ffffff;
        }

        .bubble.self {
            width: 72%;
            justify-self: end;
            background: var(--teal);
            color: #ffffff;
        }

        @media (max-width: 780px) {
            .panel {
                grid-template-columns: 1fr;
            }

            .preview {
                border-left: 0;
                border-top: 1px solid var(--line);
            }
        }

        @media (max-width: 520px) {
            .page {
                padding: 14px;
            }

            .hero,
            .preview {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="panel">
            <div class="hero">
                <span class="brand-mark">C</span>
                <h1>ChatApp</h1>
                <p>Private messaging with a clean workspace.</p>
                <div class="actions">
                    <a class="button primary" href="{% url 'login' %}">Login</a>
                    <a class="button secondary" href="{% url 'signup' %}">Create account</a>
                </div>
            </div>
            <div class="preview" aria-hidden="true">
                <div class="phone">
                    <div class="phone-head">
                        <span class="avatar">A</span>
                        <span>
                            <span class="name">Alice</span>
                            <span class="status">Live</span>
                        </span>
                    </div>
                    <div class="bubbles">
                        <div class="bubble other">Ready for the update?</div>
                        <div class="bubble self">Pushed to main.</div>
                        <div class="bubble other">Looks clean.</div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
