<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
        :root {
            --bg: linear-gradient(145deg, #f7eadf 0%, #dbe6f3 58%, #eef6ef 100%);
            --panel: rgba(255, 255, 255, 0.9);
            --border: rgba(23, 32, 51, 0.08);
            --text: #172033;
            --muted: #64748b;
            --accent: #0f766e;
            --accent-dark: #115e59;
            --error: #b9382f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 18px;
            font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .panel {
            width: min(460px, 100%);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--panel);
            box-shadow: 0 28px 80px rgba(23, 32, 51, 0.16);
            backdrop-filter: blur(14px);
        }

        .eyebrow {
            display: inline-flex;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.12);
            color: var(--accent-dark);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 800;
        }

        h1 {
            margin: 16px 0 10px;
            font-size: clamp(34px, 8vw, 48px);
            line-height: 0.96;
        }

        .intro {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.6;
        }

        form {
            display: grid;
            gap: 14px;
        }

        form p {
            margin: 0;
            display: grid;
            gap: 8px;
        }

        label {
            font-weight: 700;
        }

        input {
            width: 100%;
            min-height: 52px;
            padding: 0 16px;
            border-radius: 16px;
            border: 1px solid rgba(23, 32, 51, 0.12);
            font: inherit;
            color: var(--text);
            background: #ffffff;
        }

        input:focus {
            outline: none;
            border-color: rgba(15, 118, 110, 0.58);
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
        }

        ul.errorlist {
            margin: 0;
            padding: 0;
            list-style: none;
            color: var(--error);
            font-size: 14px;
            font-weight: 600;
        }

        .submit {
            margin-top: 6px;
            min-height: 54px;
            border: 0;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #ffffff;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
        }

        .footer-link {
            display: inline-block;
            margin-top: 18px;
            color: var(--accent-dark);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <section class="panel">
        <span class="eyebrow">Secure Login</span>
        <h1>Welcome back</h1>
        <p class="intro">Session auth brauzer cookie orqali websocket qatlamiga ham uzatiladi. Shu login oqimi endi realtime room access bilan bog'langan.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {{ form.as_p }}
            <button class="submit" type="submit">Login</button>
        </form>

        <a class="footer-link" href="{% url 'signup' %}">Create a new account</a>
    </section>
</body>
</html>
