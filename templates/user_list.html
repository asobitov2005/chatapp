<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversations | ChatApp</title>
    <style>
        :root {
            --page: #eef2f7;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --line: #d8dee9;
            --text: #172033;
            --muted: #64748b;
            --teal: #0f766e;
            --teal-dark: #115e59;
            --amber: #b45309;
            --navy: #111827;
            --shadow: 0 24px 70px rgba(17, 24, 39, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, "Avenir Next", "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background:
                linear-gradient(135deg, rgba(15, 118, 110, 0.1), transparent 34%),
                linear-gradient(225deg, rgba(180, 83, 9, 0.1), transparent 40%),
                var(--page);
        }

        .app-shell {
            min-height: 100vh;
            width: min(1180px, 100%);
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            gap: 18px;
        }

        .sidebar,
        .content-panel {
            border: 1px solid rgba(216, 222, 233, 0.92);
            background: rgba(255, 255, 255, 0.93);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .sidebar {
            border-radius: 24px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 48px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 26px;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--navy);
            color: #ffffff;
            font-weight: 900;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 900;
        }

        .profile-card {
            padding: 16px;
            border-radius: 18px;
            background: var(--surface-soft);
            border: 1px solid var(--line);
        }

        .profile-label {
            display: block;
            margin-bottom: 6px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .profile-name {
            display: block;
            font-size: 22px;
            font-weight: 900;
            word-break: break-word;
        }

        .nav-list {
            display: grid;
            gap: 10px;
            margin-top: 22px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 46px;
            padding: 0 14px;
            border-radius: 14px;
            background: #ffffff;
            border: 1px solid var(--line);
            color: var(--text);
            font-weight: 800;
        }

        .nav-count {
            display: grid;
            place-items: center;
            min-width: 28px;
            height: 28px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.12);
            color: var(--teal-dark);
            font-size: 13px;
            font-weight: 900;
        }

        .logout-form {
            margin: auto 0 0;
        }

        .logout-button {
            width: 100%;
            min-height: 48px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #ffffff;
            color: var(--navy);
            font: inherit;
            font-weight: 900;
            cursor: pointer;
        }

        .content-panel {
            border-radius: 24px;
            padding: 28px;
            min-height: calc(100vh - 48px);
        }

        .content-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 24px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 0 11px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.1);
            color: var(--teal-dark);
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        h1 {
            margin: 12px 0 0;
            font-size: clamp(34px, 5vw, 54px);
            line-height: 0.98;
            letter-spacing: 0;
        }

        .header-meta {
            color: var(--muted);
            font-weight: 800;
            white-space: nowrap;
        }

        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .user-card-form {
            margin: 0;
        }

        .user-card {
            width: 100%;
            min-height: 190px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 14px;
            padding: 20px;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: var(--surface);
            color: inherit;
            font: inherit;
            text-align: left;
            cursor: pointer;
            box-shadow: 0 12px 34px rgba(17, 24, 39, 0.06);
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .user-card:hover {
            transform: translateY(-2px);
            border-color: rgba(15, 118, 110, 0.4);
            box-shadow: 0 18px 46px rgba(17, 24, 39, 0.11);
        }

        .avatar-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .avatar {
            display: grid;
            place-items: center;
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: rgba(15, 118, 110, 0.12);
            color: var(--teal-dark);
            font-size: 22px;
            font-weight: 900;
        }

        .arrow {
            display: grid;
            place-items: center;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: var(--navy);
            color: #ffffff;
            font-weight: 900;
        }

        .user-name {
            display: block;
            font-size: 24px;
            font-weight: 900;
            word-break: break-word;
        }

        .user-description {
            display: block;
            color: var(--muted);
            line-height: 1.45;
        }

        .empty {
            min-height: 320px;
            display: grid;
            place-items: center;
            border: 1px dashed rgba(100, 116, 139, 0.45);
            border-radius: 20px;
            background: var(--surface-soft);
            text-align: center;
            padding: 30px;
        }

        .empty h2 {
            margin: 0 0 8px;
            font-size: 28px;
            letter-spacing: 0;
        }

        .empty p {
            margin: 0;
            color: var(--muted);
        }

        @media (max-width: 860px) {
            .app-shell {
                grid-template-columns: 1fr;
                padding: 16px;
            }

            .sidebar,
            .content-panel {
                min-height: auto;
            }

            .logout-form {
                margin-top: 20px;
            }
        }

        @media (max-width: 560px) {
            .content-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .header-meta {
                white-space: normal;
            }
        }
    </style>
</head>
<body>
    <main class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-mark">C</span>
                <span class="brand-name">ChatApp</span>
            </div>

            <section class="profile-card">
                <span class="profile-label">Signed in</span>
                <span class="profile-name">{{ request.user.username }}</span>
            </section>

            <nav class="nav-list" aria-label="Summary">
                <div class="nav-item">
                    <span>People</span>
                    <span class="nav-count">{{ users|length }}</span>
                </div>
            </nav>

            <form class="logout-form" method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="logout-button" type="submit">Logout</button>
            </form>
        </aside>

        <section class="content-panel">
            <header class="content-header">
                <div>
                    <span class="eyebrow">Conversations</span>
                    <h1>Choose a chat</h1>
                </div>
                <span class="header-meta">{{ users|length }} available</span>
            </header>

            {% if users %}
                <div class="user-grid">
                    {% for user in users %}
                        <form class="user-card-form" method="post" action="{% url 'create_room' user.username %}">
                            {% csrf_token %}
                            <button class="user-card" type="submit">
                                <span class="avatar-row">
                                    <span class="avatar">{{ user.username|slice:":1"|upper }}</span>
                                    <span class="arrow">-&gt;</span>
                                </span>
                                <span class="user-name">{{ user.username }}</span>
                                <span class="user-description">Open private room</span>
                            </button>
                        </form>
                    {% endfor %}
                </div>
            {% else %}
                <div class="empty">
                    <div>
                        <h2>No users yet</h2>
                        <p>New people will appear here.</p>
                    </div>
                </div>
            {% endif %}
        </section>
    </main>
</body>
</html>
